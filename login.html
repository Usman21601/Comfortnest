    <!-- Login Form Section -->
    <section class="login-section">
        <div class="container">
            <h2>Welcome Back</h2>
            <div class="login-form-container">
                <!-- Login tabs -->
                <div class="login-tabs">
                    <div class="login-tab active" id="email-tab">Email Login</div>
                </div>
                
                <!-- Status message display -->
                <div id="status-message" class="status-message"></div>

                <!-- Email Login Form -->
                <div class="login-form tab-content active" id="email-login">
                    <form id="login-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="forgot-password">
                            <a href="#" id="forgot-password-link">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn-primary">Login</button>
                    </form>
                </div>
                
                <div class="signup-link">
                    <p>Don't have an account?</p>
                    <a href="sign up.html">
                        <button type="button" class="btn-secondary">Sign up</button>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Forgot Password Modal -->
    <div class="modal" id="forgot-password-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Reset Password</h3>
            <form id="forgot-password-form">
                <!-- Step 1: Email Input -->
                <div id="step-1">
                    <div class="form-group">
                        <label for="reset-email">Enter your email address</label>
                        <input type="email" id="reset-email" name="reset-email" required placeholder="your@email.com">
                    </div>
                    <div class="form-actions">
                        <button type="button" id="send-otp-btn" class="btn-primary">Send OTP</button>
                    </div>
                </div>
                
                <!-- Step 2: OTP Verification and New Password -->
                <div id="otp-section" style="display: none;">
                    <div class="form-group">
                        <label for="otp">Enter OTP sent to your email</label>
                        <input type="text" id="otp" name="otp" required placeholder="6-digit OTP">
                        <div class="otp-info">
                            <i class="fas fa-info-circle"></i>
                            <span>OTP is valid for 15 minutes</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" name="new-password" required placeholder="Enter new password">
                    </div>
                    <div class="form-group">
                        <label for="confirm-new-password">Confirm New Password</label>
                        <input type="password" id="confirm-new-password" name="confirm-new-password" required placeholder="Confirm new password">
                    </div>
                    <div class="password-requirements">
                        <p id="req-length"><i class="fas fa-check-circle"></i> Minimum 8 characters</p>
                        <p id="req-number"><i class="fas fa-check-circle"></i> Include at least one number</p>
                        <p id="req-special"><i class="fas fa-check-circle"></i> Include at least one special character</p>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="reset-password-btn" class="btn-primary">Reset Password</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    </div>
