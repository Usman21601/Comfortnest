<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Property Rental</title>
    <link rel="stylesheet" href="signup.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome and Boxicons for icons -->
    <link href="https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header Section -->
    <header class="header" id="header">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="/index.html">
            <img src="./logohd.png" alt="ComfortNest" style="height:48px;width:auto;object-fit:contain;margin-right:10px;">
            <span class="fw-bold fs-3" style="letter-spacing:1px;">ComfortNest</span>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
              <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
              <li class="nav-item"><a class="nav-link" href="/privacy-policy.html">Privacy Policy</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- Sign Up Form Section -->
    <section class="contact">
        <div class="container">
            <h2>Sign Up</h2>
            <div class="contact-form">
                <div class="form-right">
                    <form id="signup-form">
                        <div class="form-group">
                            <label for="profilePic">Profile Picture</label>
                            <input type="file" id="profilePic" name="profilePic" accept="image/*">
                            <div id="profilePicPreview" style="margin-top:10px;"></div>
                        </div>

                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                            <button type="button" id="sendEmailOtp" class="btn-secondary">Send OTP to Email</button>
                        </div>
                        <div class="form-group">
                            <label for="emailOtp">Email OTP</label>
                            <input type="text" id="emailOtp" name="emailOtp" placeholder="Enter OTP">
                            <button type="button" id="verifyEmailOtp" class="btn-secondary">Verify Email OTP</button>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn-primary signup-btn">Sign Up</button>

                        <div class="login-link">
                            <p>Already have an account?</p>
                            <a href="login.html">
                                <button type="button" class="btn-secondary">Login</button>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Status messages -->
    <div id="status-message" class="status-message"></div>
    
    <!-- Feedback Messages Modal -->
    <div class="modal" id="feedbackModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="feedbackModalTitle">Message</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close" id="closeModalBtn">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p id="feedbackModalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal" id="modalCloseBtn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth0 SDK -->
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    <script src="js/auth0-config.js"></script>
    <script src="js/signup-auth0.js" defer></script>
    
    <!-- API and JS scripts -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
      (function(){
        emailjs.init("TZ1vCirsSMLfjTch5");
      })();
    </script>
    <script src="js/api.js"></script>
    <script src="js/signup.js"></script>
</body>
</html>
