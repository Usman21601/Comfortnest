<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Property | ComfortNest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="edit-property.css">
</head>
<body>
    <header class="header" id="header">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center" href="/index.html">
            <img src="./logohd.png" alt="ComfortNest" style="height:48px;width:auto;object-fit:contain;margin-right:10px;">
            <span class="fw-bold fs-3" style="letter-spacing:1px;">ComfortNest</span>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
              <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
              <li class="nav-item"><a class="nav-link" href="/privacy-policy.html">Privacy Policy</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="main-content">
        <section class="edit-section">
            <h2 class="section-heading">Edit Property</h2>
            <div class="form-container">
                <form id="edit-property-form">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" id="price" name="price" required>
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" required>
                    </div>
                    <div class="form-group">
                        <label for="bedrooms">Bedrooms</label>
                        <input type="number" id="bedrooms" name="bedrooms" required>
                    </div>
                    <div class="form-group">
                        <label for="bathrooms">Bathrooms</label>
                        <input type="number" id="bathrooms" name="bathrooms" required>
                    </div>
                    <div class="form-group">
                        <label for="size">Size (sq ft)</label>
                        <input type="number" id="size" name="size" required>
                    </div>
                    <div class="form-group">
                        <label for="propertyType">Property Type</label>
                        <select id="propertyType" name="propertyType" required>
                            <option value="">Select Type</option>
                            <option value="House">House</option>
                            <option value="Apartment">Apartment</option>
                            <option value="Condo">Condo</option>
                            <option value="Villa">Villa</option>
                            <option value="Studio">Studio</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="amenities">Amenities (comma separated)</label>
                        <input type="text" id="amenities" name="amenities" placeholder="e.g. Pool, Garden, Parking">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Update Property</button>
                        <a href="/dashboard.html" class="btn-cancel">Cancel</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- API and JS scripts -->
    <script src="js/api.js"></script>
    <script src="js/edit-property.js"></script>
</body>
</html>
